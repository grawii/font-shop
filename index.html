<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้ารวมสินค้า</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">LOGO</div>
            <ul class="nav-links">
                <li><a href="index.html">สินค้า</a></li>
                <li><a href="cart.html">รายการที่เลือก</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-container">
        <h1 class="category-title">สินค้าทั้งหมด</h1>
        
        <div class="product-grid">
            <div class="product-card">
                <img src="product1.jpg" alt="ชื่อสินค้า">
                <div class="product-info">
                    <h3>ชื่อฟอนต์</h3>
                    <p class="price">150 บาท</p>
                    <button class="add-to-cart" onclick="addToCart('ชื่อฟอนต์', 150, 'product1.jpg')">เลือกสินค้า</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
